<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交互式BOM</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: Verdana, sans-serif; font-size: 12px; overflow: hidden; }

    :root {
      --bg-color: #fff; --panel-bg: #fff; --text-color: #333; --border-color: #ddd;
      --hover-bg: #e8e8e8; --selected-bg: #d4e5f5; --highlight-bg: #fff3cd;
      --btn-bg: #f5f5f5; --btn-border: #888; --btn-hover: #e0e0e0; --btn-active: #0a0;
      --th-bg: #f0f0f0;
    }
    .dark {
      --bg-color: #252c30; --panel-bg: #252c30; --text-color: #eee; --border-color: #444;
      --hover-bg: #3d3d3d; --selected-bg: #2a4d6d; --highlight-bg: #5a4a00;
      --btn-bg: #3a3a3a; --btn-border: #555; --btn-hover: #4a4a4a; --btn-active: #0a0;
      --th-bg: #3a3a3a;
    }

    body { background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; }
    .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
    .bom-panel { width: 50%; min-width: 300px; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); overflow: hidden; }
    .splitter { width: 4px; background: var(--border-color); cursor: col-resize; z-index: 100; flex-shrink: 0; }
    .splitter:hover, .splitter.dragging { background: #007acc; }
    .preview-panel { flex: 1; min-width: 300px; display: flex; flex-direction: column; overflow: hidden; background: #ffffff !important; position: relative; }
    body.dark .preview-panel { background: rgb(38, 44, 48) !important; }

    .bom-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: var(--panel-bg); border-bottom: 1px solid rgba(0,0,0,0.1); gap: 8px; }
    .bom-toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .bom-toolbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .search-box { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; }
    .search-box input[type="text"] { padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--panel-bg); color: var(--text-color); font-size: 12px; width: 100%; min-width: 80px; }
    .search-box input[type="text"]:focus { outline: none; border-color: #007acc; }
    .toggle-btn { padding: 0; border: none; background: transparent; color: var(--text-color); cursor: pointer; font-size: 20px; line-height: 1; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; }
    .toggle-btn:hover { opacity: 0.7; }
    .toggle-btn.active { color: #0a0; }

    .bom-container { flex: 1; overflow: auto; }
    .bom-table { width: auto; min-width: 100%; border-collapse: collapse; font-family: Consolas, monospace; font-size: 12px; table-layout: fixed; }
    .bom-table th, .bom-table td { border: 1px solid var(--border-color); padding: 4px 6px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bom-table th { background: var(--th-bg); color: var(--text-color); position: sticky; top: 0; user-select: none; position: relative; }
    .resizer { position: absolute; right: 0; top: 0; bottom: 0; width: 12px; cursor: col-resize; background: transparent; z-index: 10; }
    .resizer:hover, .resizer.resizing { background: rgba(0, 122, 204, 0.3); }
    .column-resize-indicator { position: fixed; top: 0; bottom: 0; width: 2px; background: #007acc; z-index: 9999; pointer-events: none; }
    .bom-table tr:hover { background: var(--hover-bg); cursor: pointer; }
    .bom-table tr.selected { background: var(--selected-bg); }
    .bom-table tr.highlight { background: var(--highlight-bg); }
    .bom-table tr.checked { opacity: 0.6; }
    .keyword-highlight { background: #ffeb3b; color: #000; font-weight: bold; padding: 1px 2px; border-radius: 2px; }
    .dark .keyword-highlight { background: #f57c00; color: #fff; }

    .col-check { width: 30px; min-width: 30px; }
    .col-designators { width: 120px; min-width: 80px; }
    .col-value { width: 150px; min-width: 100px; }
    .col-package { width: 120px; min-width: 80px; }
    .col-quantity { width: 50px; min-width: 40px; }
    .col-layer { width: 80px; min-width: 50px; }
    .layer-top { color: #d32f2f; font-weight: bold; }
    .layer-bottom { color: #1976d2; font-weight: bold; }
    .dark .layer-top { color: #ef5350; }
    .dark .layer-bottom { color: #42a5f5; }

    .preview-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: var(--panel-bg); border-bottom: 1px solid rgba(0,0,0,0.1); gap: 12px; flex-wrap: wrap; }
    .preview-toolbar-group { display: flex; align-items: center; gap: 4px; padding-right: 8px; border-right: 1px solid var(--border-color); }
    .preview-toolbar-group:last-child { border-right: none; }
    .preview-toolbar label { display: flex; align-items: center; gap: 3px; cursor: pointer; font-size: 11px; white-space: nowrap; }
    .preview-toolbar button { padding: 4px 8px; border: 1px solid var(--btn-border); border-radius: 3px; background: var(--btn-bg); color: var(--text-color); cursor: pointer; font-size: 11px; }
    .preview-toolbar button:hover { background: var(--btn-hover); }
    .preview-toolbar button.active { background: #0a0; color: #fff; border-color: #090; }
    .dark-mode-btn { padding: 0 !important; border: none !important; border-radius: 0 !important; background: transparent !important; color: var(--text-color); cursor: pointer; font-size: 20px !important; line-height: 1; display: flex; align-items: center; justify-content: center; }
    .dark-mode-btn:hover { opacity: 0.7; background: transparent !important; }

    .canvas-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-container { position: relative; overflow: hidden; background: #ffffff !important; }
    body.dark .canvas-container { background: rgb(38, 44, 48) !important; }
    .canvas-container:not(.hidden) { flex: 1; }
    .canvas-container:not(.hidden) + .canvas-container:not(.hidden) { border-top: 1px solid rgba(0,0,0,0.15); }
    body.dark .canvas-container:not(.hidden) + .canvas-container:not(.hidden) { border-top: 1px solid rgba(255,255,255,0.15); }
    .canvas-container.hidden { display: none !important; }
    .canvas-container canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
    .canvas-label { position: absolute; top: 5px; left: 5px; color: #000; padding: 2px 8px; border-radius: 3px; font-size: 11px; z-index: 10; pointer-events: none; }
    body.dark .canvas-label { color: #fff; }

    .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; background: #007acc; color: #fff; font-size: 11px; }
    .status-bar-left { display: flex; align-items: center; gap: 16px; flex: 1; }
    .status-bar-right { display: flex; align-items: center; gap: 16px; }

    .crosshair { position: absolute; pointer-events: none; z-index: 1000; }
    .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(255, 87, 34, 0.9); }
    .crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }
    .crosshair::after { width: 1px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
    .context-menu { position: absolute; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 10000; min-width: 120px; }
    .context-menu-item { padding: 8px 16px; cursor: pointer; font-size: 12px; color: var(--text-color); }
    .context-menu-item:hover { background: var(--hover-bg); }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--panel-bg); }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="bom-panel">
      <div class="bom-toolbar">
        <div class="bom-toolbar-left">
          <div class="search-box">
            <input type="text" id="highlightInput" placeholder="过滤位号...">
          </div>
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="过滤...">
          </div>
        </div>
        <div class="bom-toolbar-right">
          <button id="aggregateToggle" class="toggle-btn" title="切换聚合模式">📄</button>
          <button id="exportCsvBtn" class="toggle-btn" title="导出 CSV">📥</button>
        </div>
      </div>
      <div class="bom-container">
        <table class="bom-table" id="bomTable">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="selectAll"></th>
              <th class="col-designators" data-sort="designators" id="thDesignators">位号</th>
              <th class="col-value" data-sort="value" id="thValue">值</th>
              <th class="col-package" data-sort="package" id="thPackage">封装</th>
              <th class="col-quantity" data-sort="count" id="thQuantity">数量</th>
              <th class="col-layer" data-sort="layer" id="thLayer">层</th>
            </tr>
          </thead>
          <tbody id="bomBody"></tbody>
        </table>
      </div>
    </div>
    <div class="splitter" id="splitter"></div>
    <div class="preview-panel">
      <div class="preview-toolbar">
        <div class="preview-toolbar-group">
          <button id="darkModeBtn" class="dark-mode-btn" title="切换暗色模式">🌙</button>
        </div>
        <div class="preview-toolbar-group">
          <label><input type="checkbox" id="showRefs" checked> 位号</label>
          <label><input type="checkbox" id="showValues" checked> 值</label>
          <label><input type="checkbox" id="showPads" checked> 焊盘</label>
          <label><input type="checkbox" id="showTracks"> 导线</label>
        </div>
        <div class="preview-toolbar-group">
          <label><input type="checkbox" id="autoPan"> 自动平移</label>
          <label><input type="checkbox" id="autoZoom"> 自动缩放</label>
        </div>
        <div class="preview-toolbar-group">
          <button id="layerF" class="active">顶层</button>
          <button id="layerFB">双面</button>
          <button id="layerB">底层</button>
        </div>
      </div>
      <div class="canvas-wrapper">
        <div class="canvas-container" id="frontContainer">
          <div class="canvas-label">顶层 (Front)</div>
          <canvas id="frontCanvas"></canvas>
        </div>
        <div class="canvas-container" id="backContainer">
          <div class="canvas-label">底层 (Back)</div>
          <canvas id="backCanvas"></canvas>
        </div>
      </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-bar-left">
      <span id="statusText">准备就绪</span>
      <span id="bomStats">BOM: <span id="bomCount">0</span> 项 | 元件：<span id="compCount">0</span></span>
    </div>
    <div class="status-bar-right">
      <span id="layerInfo">F: 0 | B: 0</span>
    </div>
  </div>

  <!-- JS 模块 -->
  <script src="/iframe/js/vendor/jszip.min.js"></script>
  <script src="/iframe/js/i18n.js"></script>
  <script src="/iframe/js/state.js"></script>
  <script src="/iframe/js/footprint-parser.js"></script>
  <script src="/iframe/js/footprint-renderer.js"></script>
  <script src="/iframe/js/api.js"></script>
  <script src="/iframe/js/bom.js"></script>
  <script src="/iframe/js/render.js"></script>
  <script src="/iframe/js/ui.js"></script>
  <script src="/iframe/js/interaction.js"></script>
  <script src="/iframe/js/main.js"></script>
</body>
</html>
